<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akademische Webseite</title>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
/* Social Icons modern */
.social-icons {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}

.social-icons i {
  font-size: 22px;
}

.social-icons .icon {
  background: #f5f5f5;
  color: #222; /* Farbe für die Icons - dunkler */
  font-size: 20px; /* Größe anpassen */
  display: flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  text-decoration: none;
  transition: all 0.3s ease;
}

/* Hover-Effekt für bessere Sichtbarkeit */
.social-icons .icon:hover {
  transform: translateY(-3px);
  background: #0077cc;
  color: white;
}

/* Individuelle Farben */
.social-icons .orcid:hover {
  background: #a6ce39;
}

.social-icons .linkedin:hover {
  background: #0077b5;
}

.social-icons .scholar:hover {
  background: #4285f4;
}

.social-icons .arxiv:hover {
  background: #b31b1b;
}

.social-icons .email:hover {
  background: #666;
}
</style>
</head>
<body class="font-sans text-gray-800">

<!-- Navbar -->
<header class="fixed w-full bg-white/80 backdrop-blur z-50 border-b border-gray-200">
  <div class="max-w-6xl mx-auto flex justify-between items-center px-3 py-1">
    <h1 class="text-base font-semibold">Dein Name</h1>
    <nav class="hidden md:flex gap-5 text-xs tracking-wide uppercase">
      <a href="#about" class="relative group">About<span class="absolute left-0 -bottom-0.5 w-0 h-px bg-black transition-all duration-300 group-hover:w-full"></span></a>
      <a href="#cv">CV</a>
      <a href="#research">Research</a>
      <a href="#publications">Publications</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="md:hidden text-base" onclick="toggleMenu()">☰</button>
  </div>

  <div id="mobileMenu" class="hidden md:hidden bg-white shadow-lg p-2 flex flex-col gap-2 text-center text-sm">
    <a href="#about" onclick="toggleMenu()">About</a>
    <a href="#cv" onclick="toggleMenu()">CV</a>
    <a href="#research" onclick="toggleMenu()">Research</a>
    <a href="#publications" onclick="toggleMenu()">Publications</a>
    <a href="#contact" onclick="toggleMenu()">Contact</a>
  </div>
</header>

<!-- Hero -->
<section class="bg-gray-50 border-b border-gray-200 pt-16 pb-10 px-6">
  <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-10">

    <!-- Profile -->
    <div class="flex flex-col md:flex-row items-center gap-6">
      <img src="profile.jpg" alt="Profilbild" class="w-32 h-32 rounded-lg object-cover shadow" />
      <div>
        <h2 class="text-3xl font-semibold">Dein Name</h2>
        <p class="text-sm text-gray-600">Deine akademische Position / Titel</p>

        <div class="social-icons">

          <a href="#" title="ORCID" class="icon orcid">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </a>

          <a href="#" title="arXiv" class="icon arxiv">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="4" width="14" height="16" rx="2"/>
              <path d="M9 9h6M9 13h6"/>
            </svg>
          </a>

          <a href="#" title="Google Scholar" class="icon scholar">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3 2 9l10 6 8-4.8V17h2V9L12 3z"/>
            </svg>
          </a>

          <a href="mailto:deine.email@example.com" title="Email" class="icon email">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
          </a>

          <a href="#" title="LinkedIn" class="icon linkedin">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h3v12H6V6zm1.5-3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM11 10h3v2.2h.1c.4-1 1.6-2.2 3.4-2.2 3 0 3.5 2 3.5 4.6V18h-3v-4c0-1-.2-2-1.5-2s-2 1-2 2v4h-3V10z"/>
            </svg>
          </a>

        </div>
      </div>
    </div>

    <div class="flex gap-3 flex-wrap">
      <a href="#contact" class="px-4 py-2 text-sm bg-black text-white rounded-lg">Kontakt</a>
      <a href="cv.pdf" download class="px-4 py-2 text-sm border border-gray-300 rounded-lg">CV herunterladen</a>
    </div>

  </div>
</section>

<!-- About -->
<section id="about" class="scroll-mt-20">
  <div class="max-w-6xl mx-auto p-8">
    <h3 class="text-2xl font-semibold mb-4">About</h3>
    <p>Hier kommt deine akademische Kurzbiografie rein.</p>
  </div>
</section>

<!-- CV -->
<section id="cv" class="bg-gray-50 scroll-mt-20">
  <div class="max-w-6xl mx-auto p-8">
    <h3 class="text-2xl font-semibold mb-4">Curriculum Vitae</h3>
  </div>
</section>

<!-- Research -->
<section id="research" class="scroll-mt-20">
  <div class="max-w-6xl mx-auto p-8">
    <h3 class="text-2xl font-semibold mb-4">Research</h3>
  </div>
</section>

<!-- Publications -->
<section id="publications" class="bg-gray-50 scroll-mt-20">
  <div class="max-w-6xl mx-auto p-8">
    <h3 class="text-2xl font-semibold mb-4">Publications</h3>
  </div>
</section>

<!-- Contact -->
<section id="contact" class="scroll-mt-20">
  <div class="max-w-6xl mx-auto p-8">
    <h3 class="text-2xl font-semibold mb-4">Contact</h3>
  </div>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-white text-center p-4 text-sm">
  © <span id="year"></span> Dein Name
</footer>

<script>
function toggleMenu() {
  const menu = document.getElementById('mobileMenu');
  menu.classList.toggle('hidden');
}

document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
