<!DOCTYPE html>
<html lang="de">
<head>
    <!-- Font Awesome (für das Briefumschlag-Icon) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Academicons (für ORCID, arXiv, Google Scholar) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Dennis Ulbrich</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cloudflare.com">
  <link rel="stylesheet" href="https://jsdelivr.net">
</head>
<body id="start">
<header class="site-header"> 
  <div class="nav-wrapper">
    <a href="#start" class="nav-brand">Dr. Dennis Ulbrich</a>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="#about" class="nav-link">About</a>
      <a href="#research" class="nav-link">Research</a>
      <a href="#publications" class="nav-link">Publications</a>
      <a href="#teaching" class="nav-link">Teaching</a>
      <a href="#cv" class="nav-link">Short CV</a>
    </nav>
  </div>
</header>
<div class="container">
  <section class="hero-section">
    <div class="hero-flex">
      <img src="/img/UlbrichDennis.jpg" alt="Dr. Dennis Ulbrich" class="avatar" loading="lazy"/> 
      <div class="hero-text">
        <h1>Dr. Dennis Ulbrich</h1>
        <div class="subtitle-row">
          <span>Mathematician</span>
          <span>•</span>
          <span class="badge-work">Open to work</span>
        </div>  
        <div class="social-icons">
          <a href="mailto:ulbrich.dennis@icloud.com" class="icon email" title="Email"><i class="fas fa-envelope"></i></a>
          <a href="https://orcid.org" target="_blank" class="icon orcid" title="ORCID"><i class="ai ai-orcid"></i></a>
          <a href="https://arxiv.org" target="_blank" class="icon arxiv" title="arXiv"><i class="ai ai-arxiv"></i></a>
          <a href="https://google.com" target="_blank" class="icon scholar" title="Google Scholar"><i class="ai ai-google-scholar"></i></a>
          <a href="https://linkedin.com" target="_blank" class="icon linkedin" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
    </div>
  </section>
</div>
<div class="container">
  <main class="main-content"> 
    <section id="about" class="section-card scroll-margin">
      <h3 class="section-title">About</h3>
      <p>I am a mathematician with a research background in nonlinear analysis, dynamical systems, ergodic theory, and kinetic theory...</p>
    </section>
    <section id="research" class="section-card scroll-margin">
        <h3 class="section-title">Research</h3>
        <!-- Forschungsdetails -->
    </section>
    <section id="publications" class="section-card scroll-margin">
        <h3 class="section-title">Publications</h3>
        <!-- Publikationsdetails -->
    </section>
    <section id="teaching" class="section-card scroll-margin">
        <h3 class="section-title">Teaching</h3>
        <!-- Lehrdetails -->
    </section>
    <section id="cv" class="section-card scroll-margin">
        <h3 class="section-title">Short CV</h3>
        <!-- Lebenslaufdetails -->
    </section>
  </main>
</div>
<script>
  const menuToggle = document.getElementById('menuToggle');
  const mainNav = document.getElementById('mainNav');
  const navLinks = mainNav.querySelectorAll('.nav-link');
  menuToggle.addEventListener('click', () => {
    mainNav.classList.toggle('is-open');
    menuToggle.textContent = mainNav.classList.contains('is-open') ? '✕' : '☰';
  });
  navLinks.forEach(link => {
    link.addEventListener('click', () => {
      mainNav.classList.remove('is-open');
      menuToggle.textContent = '☰';
    });
  });
</script>
</body>
</html>
