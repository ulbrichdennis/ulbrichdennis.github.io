
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Dennis Ulbrich</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons/css/academicons.min.css">

</head>

<body>

<div class="container">
<nav id="sidebar">
<h4>Navigation</h4>
<a href="#research">Research</a>
<a href="#publications">Publications</a>
<a href="#projects">Projects</a>
<a href="#teaching">Teaching</a>
<a href="#cv">CV</a>

<button id="darkModeToggle">🌙</button>
</nav>

<main>

<header>
<h2>Dr. Dennis Ulbrich</h2>
<img src="/img/Ulbrich_portrait.jpeg" class="profile-photo">

<div class="social-icons">
<a href="#" class="icon"><i class="fa-solid fa-envelope"></i></a>
</div>

</header>

<section id="research"><h3>Research</h3></section>
<section id="publications"><h3>Publications</h3></section>
<section id="projects"><h3>Projects</h3></section>
<section id="teaching"><h3>Teaching</h3></section>
<section id="cv"><h3>CV</h3></section>

</main>
</div>

<script>
const sections = document.querySelectorAll("section");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
});
sections.forEach(sec => observer.observe(sec));

const toggle = document.getElementById("darkModeToggle");
toggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
});
</script>

</body>
</html>
