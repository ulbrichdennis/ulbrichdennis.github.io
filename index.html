<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Dennis Ulbrich</title>
  <script src="https://tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cloudflare.com">
  <link rel="stylesheet" href="https://jsdelivr.net">
  <style>
    .section-card { background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; }
    .social-icons .icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #e5e7eb; transition: all 0.2s; }
    .social-icons .icon:hover { transform: translateY(-2px); }
    .social-icons .orcid:hover { background: #a6ce39; color: #fff; }
    .social-icons .email:hover { background: #4b5563; color: #fff; }
    .social-icons .linkedin:hover { background: #0077b5; color: #fff; }
    .section-card a { color: #2563eb; text-decoration: none; border-bottom: 1px dashed; }
  </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50/40">
  <main class="space-y-6 pb-20 px-4 pt-10 max-w-3xl mx-auto">
    <section class="section-card p-6">
      <h2 class="text-3xl font-bold">Dr. Dennis Ulbrich</h2>
      <p>Mathematician</p>
    </section>
    <section id="about" class="section-card p-6">
      <h3 class="font-bold mb-3">About</h3>
      <p>Mathematician with research background in nonlinear analysis, dynamical systems, and kinetic theory.</p>
    </section>
    <section id="publications" class="section-card p-6">
      <h3 class="font-bold mb-3">Publications</h3>
      <p>Peer-reviewed articles and preprints in kinetic theory and dynamical systems. (Details in source)</p>
    </section>
  </main>
</body>
</html>
